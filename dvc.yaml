stages:

  # ─────────────────────────────────────────────
  # Stage 1: Data Ingestion
  # Reads raw CSV → splits into train/test artifacts
  # ─────────────────────────────────────────────
  data_ingestion:
    cmd: python scripts/run_ingestion.py
    deps:
      - data/raw_data/fake_job_postings.csv
      - src/components/data_ingestion.py
      - src/config.py
      - config/config.yaml
    params:
      - params.yaml:
          - data.test_size
          - data.random_state
    outs:
      - artifacts/data.csv
      - artifacts/train.csv
      - artifacts/test.csv

  # ─────────────────────────────────────────────
  # Stage 2: Data Transformation
  # TF-IDF vectorization → saves vectorizer
  # ─────────────────────────────────────────────
  data_transformation:
    cmd: python scripts/run_transformation.py
    deps:
      - artifacts/train.csv
      - artifacts/test.csv
      - src/components/data_transformation.py
      - src/config.py
      - config/config.yaml
    params:
      - params.yaml:
          - transformation.max_features
          - transformation.text_columns
          - transformation.target_column
    outs:
      - artifacts/vectorizer.pkl

  # ─────────────────────────────────────────────
  # Stage 3: Model Training
  # Trains XGBoost → saves model, writes metrics
  # ─────────────────────────────────────────────
  model_training:
    cmd: python main.py
    deps:
      - artifacts/train.csv
      - artifacts/test.csv
      - artifacts/vectorizer.pkl
      - src/components/model_trainer.py
      - src/config.py
      - config/config.yaml
    params:
      - params.yaml:
          - model.learning_rate
          - model.max_depth
          - model.n_estimators
          - model.eval_metric
    outs:
      - artifacts/model.pkl
    metrics:
      - dvclive/metrics.json:
          cache: false
