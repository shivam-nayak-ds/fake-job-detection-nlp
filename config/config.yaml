data:
  raw_data_path: data/raw_data/fake_job_postings.csv
  artifacts_dir: artifacts
  raw_data_artifact: artifacts/data.csv
  train_data_path: artifacts/train.csv
  test_data_path: artifacts/test.csv
  test_size: 0.2
  random_state: 42

transformation:
  vectorizer_path: artifacts/vectorizer.pkl
  max_features: 5000
  text_columns:
    - title
    - description
    - requirements
    - benefits
    - company_profile
  target_column: fraudulent

model:
  model_path: artifacts/model.pkl
  learning_rate: 0.08
  max_depth: 6
  n_estimators: 200
  eval_metric: logloss

api:
  host: 0.0.0.0
  port: 8000
  min_description_length: 10
  max_description_length: 2000

ui:
  api_url: http://localhost:8000/predict
  api_health_url: http://127.0.0.1:8000
