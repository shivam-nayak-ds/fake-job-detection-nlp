services:
  # ─────────────────────────────────────────────
  # Service 1: FastAPI Backend
  # ─────────────────────────────────────────────
  - type: web
    name: trust-hire-api
    env: python
    region: singapore
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api.app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
